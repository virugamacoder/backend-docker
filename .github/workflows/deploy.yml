name: Deploy Node Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t node-api .

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |

            # install git if not installed
            if ! command -v git &> /dev/null
            then
              sudo apt update
              sudo apt install git -y
            fi

            # install docker if not installed
            if ! command -v docker &> /dev/null
            then
              sudo apt install docker.io -y
              sudo systemctl start docker
            fi

            # clone repo if not exists
            if [ ! -d "backend-docker" ]; then
              git clone https://github.com/virugamacoder/backend-docker.git
            fi

            cd backend-docker

            git pull origin main

            # stop old container
            docker stop node-api || true
            docker rm node-api || true

            # build new image
            docker build -t node-api .

            # run container
            docker run -d -p 3000:3000 --name node-api node-api