name: Docker Build Push Deploy Zero Downtime

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/node-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/node-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/node-api:buildcache,mode=max


  deploy:

    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |

            echo "Installing Docker..."
            sudo dnf install docker -y || true

            echo "Starting Docker..."
            sudo systemctl start docker

            echo "Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/node-api:latest

            echo "Cleaning previous GREEN container..."
            docker stop node-api-green || true
            docker rm node-api-green || true

            echo "Starting new container (GREEN)..."
            docker run -d -p 3001:3000 --name node-api-green \
            ${{ secrets.DOCKER_USERNAME }}/node-api:latest

            if [ $? -ne 0 ]; then
              echo "Container start failed → rollback"
              exit 1
            fi

            echo "Waiting for container..."
            sleep 5

            echo "Health check..."
            if curl -f http://localhost:3001
            then

              echo "Switching Nginx traffic..."

              sudo sed -i 's/localhost:3000/localhost:3001/' /etc/nginx/conf.d/node-api.conf

              sudo nginx -t
              sudo systemctl reload nginx

              echo "Stopping old container..."
              docker stop node-api || true
              docker rm node-api || true

              echo "Renaming new container..."
              docker rename node-api-green node-api

            else

              echo "Health check failed → rollback"

              docker stop node-api-green
              docker rm node-api-green

              exit 1

            fi