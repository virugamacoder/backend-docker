name: Deploy Node Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t node-api .

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd node-docker-api || git clone https://github.com/USERNAME/node-docker-api.git
          cd node-docker-api
          git pull
          docker stop node-api || true
          docker rm node-api || true
          docker build -t node-api .
          docker run -d -p 3000:3000 --name node-api node-api