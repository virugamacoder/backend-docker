name: Deploy Node Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to EC2 Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |

            echo "Updating packages..."
            sudo dnf update -y

            echo "Installing Git if missing..."
            if ! command -v git &> /dev/null
            then
              sudo dnf install git -y
            fi

            echo "Installing Docker if missing..."
            if ! command -v docker &> /dev/null
            then
              sudo dnf install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            echo "Cloning repository if it does not exist..."
            if [ ! -d "backend-docker" ]; then
              git clone https://github.com/virugamacoder/backend-docker.git
            fi

            cd backend-docker

            echo "Pulling latest code..."
            git pull origin main

            echo "Stopping old container..."
            docker stop node-api || true

            echo "Removing old container..."
            docker rm node-api || true

            echo "Removing old image..."
            docker rmi node-api || true

            echo "Building new Docker image..."
            docker build -t node-api .

            echo "Starting new container..."
            docker run -d -p 3000:3000 --name node-api node-api

            echo "Deployment completed successfully!"