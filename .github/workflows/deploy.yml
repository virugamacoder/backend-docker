name: Docker Build Push Deploy Zero Downtime

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/node-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/node-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/node-api:buildcache,mode=max


  deploy:

    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |

            echo "Installing Docker..."
            sudo dnf install docker -y || true

            echo "Starting Docker..." 
            sudo systemctl start docker

            echo "Enabling Docker on boot..."
            sudo systemctl enable docker

            echo "Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/node-api:latest

            echo "Starting new container (GREEN)..."

            docker run -d -p 3001:3000 --name node-api-green ${{ secrets.DOCKER_USERNAME }}/node-api:latest
            echo "Waiting for container..."

            sleep 5

            echo "Health check..."

            if curl -f http://localhost:3001
            then

              echo "New container healthy → switching traffic"

              sudo sed -i 's/localhost:3000/localhost:3001/' /etc/nginx/conf.d/node-api.conf

              echo "Testing nginx configuration"
              sudo nginx -t   

              echo "Reloading nginx"
              sudo systemctl reload nginx

              echo "Stopping old container"

              docker stop node-api || true

              echo "Removing old container"
              docker rm node-api || true

              echo "Renaming new container to node-api"
              docker rename node-api-green node-api

            else
              
              echo "Deployment failed → rollback"

              echo "Stopping new container"
              docker stop node-api-green

              echo "Removing new container"
              docker rm node-api-green

            fi