name: Deploy Node Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |

            # install git
            if ! command -v git &> /dev/null
            then
              sudo dnf install git -y
            fi

            # install docker
            if ! command -v docker &> /dev/null
            then
              sudo dnf install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # clone repo if not exists
            if [ ! -d "backend-docker" ]; then
              git clone https://github.com/virugamacoder/backend-docker.git
            fi

            cd backend-docker

            git pull origin main

            docker stop node-api || true
            docker rm node-api || true

            docker build -t node-api .

            docker run -d -p 3000:3000 --name node-api node-api